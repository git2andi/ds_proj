# =============================================================================
# Dialogue Simulator — Central Configuration
# All tuneable parameters live here. No magic numbers in code.
# =============================================================================

# ---------------------------------------------------------------------------
# LLM provider
# ---------------------------------------------------------------------------
llm:
  provider: "uni"                          # "uni" | "groq" | "gemini"
  models:
    uni: "llama3.3:latest"
    groq: "llama-3.3-70b-versatile"
    gemini: "gemini-2.0-flash-lite"
  endpoints:
    uni: "http://ursa.ds.uni-bamberg.de:11434/api/generate"
  sampling:
    temperature: 0.85
    top_k: 50
    top_p: 0.95
  gemini_rpm_delay: 12                     # seconds between Gemini calls (free tier = 5 RPM)

# ---------------------------------------------------------------------------
# Simulation
# ---------------------------------------------------------------------------
simulation:
  # How many participants per dialogue.
  # Set to a fixed number, or use "random" to pick from the range below.
  num_participants: 3
  num_participants_random: false
  num_participants_min: 2
  num_participants_max: 5

  # Moderator behaviour: "active" | "minimal" | "passive"
  moderator_style: "active"

# ---------------------------------------------------------------------------
# Turn budget
# ---------------------------------------------------------------------------
turns:
  hard_ceiling: 40                         # absolute max turns before force-close
  min_before_narrowing: 6                  # never narrow before this many participant turns
  phase_budgets:
    opening: 2
    preference_expression: 6
    negotiation: 12
    narrowing: 8
    confirmation: 4

# ---------------------------------------------------------------------------
# Consensus detection
# ---------------------------------------------------------------------------
consensus:
  llm_check_every_n_turns: 5              # run LLM check every N turns (negotiation onward)
  regex_window: 8                          # recent lines to scan for explicit votes
  stall_rounds_to_force:
    active: 2
    minimal: 3
    passive: 999                           # passive never forces
  max_dissenters_active: 1                 # active: allow up to N dissenters
  max_dissenters_other: 0                  # minimal/passive: require unanimity

# ---------------------------------------------------------------------------
# Repetition / stall detection
# ---------------------------------------------------------------------------
repetition:
  pressure_window: 8                       # lines included in overlap calculation
  min_word_length: 3                       # ignore short words in overlap
  forbidden_frames:                        # structural patterns always blocked
    - "building on what * said"
    - "as * mentioned"
    - "to echo what * said"
    - "I agree with * that"

# ---------------------------------------------------------------------------
# Persona generation
# ---------------------------------------------------------------------------
personas:
  generate_backstory: true                 # LLM writes backstory + goal informed by sampled traits
  generate_goal: true

  # Scalar trait range for random sampling (1–5 scale)
  trait_min: 1
  trait_max: 5

  # Lightweight group diversity enforcement.
  # After all traits are sampled, a single pass checks the group:
  #   - if ALL sims have agreeableness >= diversity_agree_threshold, one is resampled low (1–2)
  #   - if NO sim has contrarian >= diversity_contrarian_min, one is bumped to that value
  # Set enforce_diversity: false to disable entirely.
  enforce_diversity: true
  diversity_agree_threshold: 4            # "too agreeable" if everyone is >= this
  diversity_contrarian_min: 4             # "no pushback" if nobody reaches this

# ---------------------------------------------------------------------------
# Output / logging
# ---------------------------------------------------------------------------
output:
  log_dir: "logs"
  save_csv: true
  save_txt: true